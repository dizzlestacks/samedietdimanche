<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Samedi Et Dimanche — WHERE THE WEEK ENDS. Shop the collection.">
  <meta name="author" content="Damion Wright">
  <meta name="keywords" content="samedi, dimanche, samedietdimanche, luxury, clothing, shop">
  <meta property="og:title" content="CLOTHING — SAMEDI ET DIMANCHE">
  <meta property="og:description" content="WHERE THE WEEK ENDS. Curated Essentials.">
  <meta property="og:image" content="img/favicon.png">
  <meta property="og:type" content="website">
  <title>CLOTHING — SAMEDI ET DIMANCHE</title>

  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="180x180" href="img/favicon.png">
  <link rel="apple-touch-icon" href="img/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/shop.css">
</head>
<body>

  <div id="page-transition"></div>
  <div class="noise"></div>
  <div id="petals"></div>

  <div id="toast" class="toast"></div>

  <header class="shop-header animate-in" style="--delay: 0s">
    <a href="shop.html" class="header-logo-wrap">
      <img src="img/newlogo.png" alt="Samedi Et Dimanche" class="header-logo">
      <span class="page-indicator">Clothing</span>
    </a>
  </header>

  <main class="shop-content">

    <div class="shop-hero animate-in" style="--delay: 0.2s">
      <h1 class="shop-title">Collection</h1>
      <p class="shop-subtitle">Curated essentials for the weekend</p>
    </div>

    <div id="product-grid" class="product-grid">
      <div class="loading-indicator animate-in" style="--delay: 0.3s">
        <p class="loading-text">Loading collection...</p>
      </div>
    </div>

  </main>

  <div id="product-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div class="modal-body">
        <div class="modal-image-wrap">
          <img id="modal-image" src="" alt="" class="modal-image">
        </div>
        <div class="modal-details">
          <h2 id="modal-name" class="modal-name"></h2>
          <p id="modal-description" class="modal-description"></p>
          <p id="modal-price" class="modal-price"></p>
          <div class="modal-quantity">
            <label class="quantity-label">Quantity</label>
            <div class="quantity-controls">
              <button class="qty-btn" id="qty-minus">−</button>
              <span id="qty-value" class="qty-value">1</span>
              <button class="qty-btn" id="qty-plus">+</button>
            </div>
          </div>
          <button id="buy-btn" class="buy-btn">Purchase</button>
          <p class="payment-note">Secure checkout via Stripe — card, Apple Pay, Google Pay & more</p>
        </div>
      </div>
    </div>
  </div>

  <div id="zoom-overlay" class="zoom-overlay" style="display:none">
    <button class="zoom-close" id="zoom-close">&times;</button>
    <div class="zoom-container" id="zoom-container">
      <img id="zoom-image" class="zoom-image" src="" alt="">
    </div>
  </div>

  <footer class="site-footer animate-in" style="--delay: 0.8s">
    <p class="copyright">&copy; <span id="year"></span> &nbsp;Samedi Et Dimanche</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script src="js/petals.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
