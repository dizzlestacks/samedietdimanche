<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YARDEES Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8faf8;
      color: #1a1a2e;
      min-height: 100%;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body.dark {
      background: #0c0f0c;
      color: #e8e8ec;
    }

    .app-shell {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #0d1f0d 0%, #0a160a 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    body.dark .sidebar {
      background: linear-gradient(180deg, #080e08 0%, #050a05 100%);
    }
    .sidebar-brand {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-brand h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-brand h1 .brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, hsl(128,85%,45%) 0%, hsl(128,90%,35%) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 12px hsla(128,90%,40%,0.3);
    }
    .sidebar-brand .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .sidebar-nav {
      padding: 16px 12px;
      flex: 1;
    }
    .nav-section {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 12px 12px 8px;
    }
    .nav-item {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.55);
      border-radius: 10px;
      transition: all 0.15s ease;
      margin-bottom: 2px;
      position: relative;
    }
    .nav-item:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.85);
    }
    .nav-item.active {
      background: linear-gradient(135deg, hsla(128,85%,45%,0.15) 0%, hsla(128,90%,35%,0.1) 100%);
      color: hsl(128,80%,65%);
      font-weight: 600;
    }
    .nav-item .nav-icon {
      width: 20px;
      text-align: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .nav-item .nav-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      line-height: 1.4;
    }
    .nav-badge.badge-count { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); }
    .nav-badge.badge-warn { background: #f59e0b; color: #fff; }
    .nav-badge.badge-alert { background: #ef4444; color: #fff; }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: 8px;
    }
    .sidebar-footer .btn { flex: 1; justify-content: center; font-size: 12px; }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e8ece8;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    body.dark .topbar {
      background: #111411;
      border-color: #1c201c;
    }
    .topbar-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1a1a2e;
    }
    body.dark .topbar-title { color: #e8e8ec; }
    .topbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .content-scroll {
      flex: 1;
      overflow-y: scroll;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 28px 32px 60px;
    }

    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1f0d 0%, #0a160a 50%, #111 100%);
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
    }
    body.dark .login-card {
      background: #151a15;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    }
    .login-card .login-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .login-card .login-icon img {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      object-fit: contain;
    }
    .login-card h2 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .login-card p {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .login-card .input-wrap {
      margin-bottom: 16px;
    }

    input[type="password"], input[type="text"], input[type="search"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e8e5;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      background: #f8faf8;
      outline: none;
      transition: all 0.2s ease;
    }
    body.dark input[type="password"], body.dark input[type="text"], body.dark input[type="search"] {
      background: #0c0f0c;
      border-color: #222822;
      color: #e8e8ec;
    }
    input:focus {
      border-color: hsl(128,80%,45%);
      box-shadow: 0 0 0 4px hsla(128,90%,40%,0.1);
    }
    textarea { font-family: inherit; }
    body.dark textarea { background: #0c0f0c !important; border-color: #222822 !important; color: #e8e8ec !important; }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, hsl(128,85%,45%) 0%, hsl(128,90%,35%) 100%);
      color: #fff;
      width: 100%;
      justify-content: center;
      box-shadow: 0 4px 14px hsla(128,90%,40%,0.3);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 20px hsla(128,90%,40%,0.4);
      transform: translateY(-1px);
    }
    .btn-ghost {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #dde0dd;
      color: #555;
    }
    body.dark .btn-outline { border-color: #2a2e2a; color: #999; }
    .btn-outline:hover { border-color: #999; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
    .btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 7px; }
    .btn-green { background: #16a34a; color: #fff; }
    .btn-green:hover { background: #15803d; }
    .btn-red { background: #ef4444; color: #fff; }
    .btn-red:hover { background: #dc2626; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e8ece8;
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    body.dark .stat-card {
      background: #131713;
      border-color: #1c201c;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, hsl(128,85%,45%), hsl(128,90%,35%));
      opacity: 0.6;
    }
    .stat-card .stat-num {
      font-size: 32px;
      font-weight: 900;
      color: hsl(128,85%,40%);
      line-height: 1;
      letter-spacing: -1px;
    }
    .stat-card .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-amber { background: #fef3c7; color: #92400e; }
    body.dark .badge-amber { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    body.dark .badge-red { background: rgba(239,68,68,0.2); color: #f87171; }
    .badge-green { background: #dcfce7; color: #166534; }
    body.dark .badge-green { background: rgba(22,163,74,0.15); color: #4ade80; }
    .badge-blue { background: #dbeafe; color: #1e40af; }
    body.dark .badge-blue { background: rgba(37,99,235,0.15); color: #60a5fa; }
    .badge-purple { background: #ede9fe; color: #5b21b6; }
    body.dark .badge-purple { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .badge-gray { background: #f3f4f6; color: #4b5563; }
    body.dark .badge-gray { background: rgba(255,255,255,0.08); color: #9ca3af; }

    .panel {
      background: #fff;
      border: 1px solid #e8ece8;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    body.dark .panel {
      background: #131713;
      border-color: #1c201c;
    }
    .panel-header {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card {
      background: #fff;
      border: 1px solid #e8ece8;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      transition: box-shadow 0.15s ease;
    }
    body.dark .card { background: #131713; border-color: #1c201c; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    body.dark .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .card-body { flex: 1; min-width: 150px; }
    .card-body .label { font-size: 13px; font-weight: 600; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .card-body .meta { font-size: 11px; color: #888; }
    .card-body .detail { font-size: 11px; color: #666; margin-top: 2px; }
    body.dark .card-body .detail { color: #999; }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .empty { text-align: center; padding: 60px 20px; color: #999; }
    .empty .empty-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.25; }
    .empty p { font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: #999; font-size: 14px; }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      z-index: 100;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      animation: toastIn 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    body.dark .toast { background: #2a2e2a; }
    @keyframes toastIn { from { transform: translateY(16px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

    a { color: hsl(128,80%,40%); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .search-bar { margin-bottom: 16px; }
    .search-bar input { max-width: 360px; }

    .table-wrap {
      background: #fff;
      border: 1px solid #e8ece8;
      border-radius: 14px;
      overflow: auto;
    }
    body.dark .table-wrap { background: #131713; border-color: #1c201c; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 2px solid #e8ece8;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }
    body.dark th { border-color: #1c201c; background: #131713; }
    td { padding: 10px 14px; border-bottom: 1px solid #f0f2f0; vertical-align: middle; }
    body.dark td { border-color: #1a1d1a; }
    tr:hover td { background: hsla(128,60%,45%,0.04); }
    .truncate { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; }

    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .confirm-box { background: #fff; border-radius: 20px; padding: 32px; max-width: 380px; width: 90%; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.2); }
    body.dark .confirm-box { background: #151a15; }
    .confirm-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .confirm-box p { font-size: 14px; color: #888; margin-bottom: 20px; }
    .confirm-box .actions { display: flex; gap: 8px; justify-content: center; }

    code { font-size: 10px; color: #888; background: #f3f4f6; padding: 2px 6px; border-radius: 5px; font-family: 'SF Mono', 'Fira Code', monospace; }
    body.dark code { background: #1a1d1a; }

    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .chart-card {
      background: #fff;
      border: 1px solid #e8ece8;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    body.dark .chart-card { background: #131713; border-color: #1c201c; }
    .chart-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .chart-card canvas { width: 100% !important; max-height: 260px; }
    .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-nav { display: flex !important; }
      .content-scroll { padding: 20px 16px 60px; }
      .topbar { padding: 14px 16px; }
      .two-col { grid-template-columns: 1fr; }
      .analytics-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }

    .mobile-nav {
      display: none;
      overflow-x: auto;
      gap: 4px;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e8ece8;
      flex-shrink: 0;
    }
    body.dark .mobile-nav { background: #111411; border-color: #1c201c; }
    .mobile-nav .nav-pill {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      color: #666;
      background: #f3f4f6;
      border: none;
      font-family: inherit;
      transition: all 0.15s ease;
    }
    body.dark .mobile-nav .nav-pill { background: #1a1d1a; color: #999; }
    .mobile-nav .nav-pill.active {
      background: hsl(128,85%,40%);
      color: #fff;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
    if (typeof Chart === 'undefined') {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.7/chart.umd.min.js';
      document.head.appendChild(s);
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="confirm" style="display:none"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      console.error('[admin error]', msg, 'at line', line, err);
      const d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#dc2626;color:#fff;padding:10px 16px;font-size:13px;z-index:9999;font-family:monospace';
      d.textContent = 'JS Error: ' + msg + ' (line ' + line + ')';
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 8000);
    };
    const $ = s => document.querySelector(s);
    const app = $('#app');
    let currentTab = 'overview';
    let adminState = null;
    let stats = null;
    let verifications = [];
    let reports = [];
    let usersList = [];
    let listingsList = [];
    let searchUsers = '';
    let searchListings = '';
    let analyticsData = null;
    let analyticsCharts = {};
    let feedbackList = [];
    let disputesList = [];
    let filters = {
      users: { verification: '', dateFrom: '', dateTo: '', sort: '' },
      listings: { category: '', status: '', dateFrom: '', dateTo: '', country: '', city: '', type: '', priceMin: '', priceMax: '' },
      reports: { status: '', dateFrom: '', dateTo: '' },
      feedback: { status: '', type: '', dateFrom: '', dateTo: '' },
      verifications: { status: '' },
    };
    let filtersVisible = { users: false, listings: false, reports: false, feedback: false, verifications: false };

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function showConfirm(title, msg, onYes) {
      const c = $('#confirm');
      c.style.display = '';
      c.innerHTML = `<div class="confirm-overlay"><div class="confirm-box"><h3>${title}</h3><p>${msg}</p><div class="actions"><button class="btn btn-outline btn-sm" id="cfmNo">Cancel</button><button class="btn btn-red btn-sm" id="cfmYes">Confirm</button></div></div></div>`;
      $('#cfmNo').onclick = () => c.style.display = 'none';
      $('#cfmYes').onclick = () => { c.style.display = 'none'; onYes(); };
    }

    function getAdminToken() {
      return localStorage.getItem('yardees_admin_token');
    }

    async function api(url, opts = {}) {
      const token = getAdminToken();
      const headers = { ...(opts.headers || {}) };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(url, { credentials: 'include', ...opts, headers });
      if (!res.ok) {
        let msg = 'Request failed';
        try { const j = await res.json(); msg = j.message || msg; } catch {}
        throw new Error(msg);
      }
      return res.json();
    }

    async function checkAdmin() {
      try { adminState = await api('/api/admin/check'); } catch { adminState = { isAdmin: false }; }
      render();
      if (adminState.isAdmin) loadAll();
    }

    async function loadAll() {
      try {
        const [listingsResult, s, v, r, u, a, f, d] = await Promise.all([
          api('/api/admin/listings').catch(() => ({ items: [] })),
          api('/api/admin/stats').catch(() => null),
          api('/api/admin/verifications').catch(() => []),
          api('/api/admin/reports').catch(() => []),
          api('/api/admin/users').catch(() => []),
          api('/api/admin/analytics').catch(() => null),
          api('/api/admin/feedback').catch(() => []),
          api('/api/admin/disputes').catch(() => []),
        ]);
        listingsList = listingsResult.items || listingsResult;
        stats = s;
        verifications = v;
        reports = r;
        usersList = u;
        analyticsData = a;
        feedbackList = f;
        disputesList = d;
      } catch (e) { console.error(e); }
      render();
    }

    async function adminLogin(pw) {
      try {
        const result = await api('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw || '' }) });
        if (result.token) localStorage.setItem('yardees_admin_token', result.token);
        if (result.noPassword) {
          showToast('Welcome! No password is set — please set one for security.');
        } else {
          showToast('Welcome back, Admin');
        }
        checkAdmin();
      } catch { showToast('Incorrect password'); }
    }

    async function adminLogout() {
      if (adminState?.sessionAuthed) { window.location.href = '/api/logout'; }
      else {
        await api('/api/admin/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' } }).catch(() => {});
        localStorage.removeItem('yardees_admin_token');
        adminState = { isAdmin: false };
        render();
      }
    }

    function showChangePasswordModal() {
      const c = $('#confirm');
      c.style.display = '';

    async function updateVerification(id, status) {
      try {
        const token = getAdminToken();
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = 'Bearer ' + token;
        const payload = { status };
        const noteEl = document.getElementById('ver-note-' + id);
        const expiryEl = document.getElementById('ver-expiry-' + id);
        if (noteEl && noteEl.value.trim()) payload.adminNote = noteEl.value.trim();
        if (expiryEl && expiryEl.value) payload.expiryDate = new Date(expiryEl.value).toISOString();
        const res = await fetch('/api/admin/verifications/' + id, {
          method: 'PATCH',
          credentials: 'include',
          headers,
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.message || 'Request failed with status ' + res.status);
        }
        const expiryMsg = expiryEl && expiryEl.value ? ' (expires ' + new Date(expiryEl.value).toLocaleDateString() + ')' : '';
        showToast(status === 'approved' ? '✓ Verification approved' + expiryMsg : '✗ Verification rejected');
        loadAll();
      } catch (e) {
        showToast('Failed: ' + (e.message || 'try logging in again'));
        console.error('Verification update failed:', e);
      }
    }

    function getActiveFilterCount(tab) {
      const f = filters[tab];
      if (!f) return 0;
      return Object.values(f).filter(v => v !== '').length;
    }

    function resetFilters(tab) {
      const f = filters[tab];
      if (f) Object.keys(f).forEach(k => f[k] = '');
    }

    function filterByDate(item, dateField, dateFrom, dateTo) {
      if (!dateFrom && !dateTo) return true;
      const d = new Date(item[dateField]);
      if (dateFrom && d < new Date(dateFrom)) return false;
      if (dateTo && d > new Date(dateTo + 'T23:59:59')) return false;
      return true;
    }

    function renderFilterPanel(tab, filtersHtml) {
      const count = getActiveFilterCount(tab);
      const isOpen = filtersVisible[tab];
      return `<div class="filter-panel" style="margin-bottom:16px">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:${isOpen ? '12' : '0'}px">
          <button class="btn btn-outline btn-sm" id="toggleFilter-${tab}" style="gap:6px">
            🔍 Filters ${count > 0 ? `<span style="background:hsl(128,85%,45%);color:#fff;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:700">${count}</span>` : ''}
          </button>
          ${count > 0 ? `<button class="btn btn-ghost btn-xs" id="resetFilter-${tab}" style="color:#888">✕ Reset</button>` : ''}
        </div>
        <div id="filterBody-${tab}" style="display:${isOpen ? 'flex' : 'none'};flex-wrap:wrap;gap:10px;align-items:flex-end;padding:14px;background:var(--filter-bg,#f4f7f4);border-radius:10px;border:1px solid var(--filter-border,#e5e8e5)">
          ${filtersHtml}
        </div>
      </div>`;
    }

    function renderFilterField(label, id, type, options) {
      if (type === 'select') {
        return `<div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:11px;font-weight:600;color:#888">${label}</label>
          <select id="${id}" style="padding:6px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;background:#fff;min-width:130px;font-family:inherit">
            <option value="">All</option>
            ${options.map(o => `<option value="${o.value}" ${o.selected ? 'selected' : ''}>${o.label}</option>`).join('')}
          </select>
        </div>`;
      }
      if (type === 'date') {
        return `<div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:11px;font-weight:600;color:#888">${label}</label>
          <input type="date" id="${id}" value="${options || ''}" style="padding:6px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;background:#fff;font-family:inherit" />
        </div>`;
      }
      if (type === 'number') {
        return `<div style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:11px;font-weight:600;color:#888">${label}</label>
          <input type="number" id="${id}" value="${options || ''}" placeholder="${label}" style="padding:6px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;background:#fff;width:100px;font-family:inherit" />
        </div>`;
      }
      return '';
    }

    function bindFilterToggle(tab, renderFn, el) {
      const toggle = document.getElementById('toggleFilter-' + tab);
      if (toggle) toggle.onclick = () => { filtersVisible[tab] = !filtersVisible[tab]; renderFn(el); };
      const reset = document.getElementById('resetFilter-' + tab);
      if (reset) reset.onclick = () => { resetFilters(tab); renderFn(el); };

        </div>

          <div class="topbar">
            <div class="topbar-title">${getTabLabel(currentTab)}</div>
            <div class="topbar-actions">
              <button class="btn btn-outline btn-sm" id="themeToggle">🌙</button>
              <button class="btn btn-outline btn-sm" id="refreshBtn" data-action="refresh">↻ Refresh</button>
            </div>
          </div>
          <div class="mobile-nav">
            ${tabConfig.map(t => `<button class="nav-pill ${currentTab===t.key?'active':''}" data-tab="${t.key}">${t.icon} ${t.label}</button>`).join('')}
          </div>
          <div class="content-scroll" id="tabContent"></div>
        </div>
      </div>`;

      app.innerHTML = html;
      document.querySelectorAll('.nav-item[data-tab], .nav-pill[data-tab]').forEach(t => { t.onclick = () => { currentTab = t.dataset.tab; render(); }; });
      const lo = document.getElementById('logoutBtn');
      if (lo) lo.onclick = adminLogout;
      const cpb = document.getElementById('changePwBtn');
      if (cpb) cpb.onclick = showChangePasswordModal;
      fetch('/api/admin/password-status').then(r => r.json()).then(data => {
        if (!data.hasPassword) {
          const contentScroll = document.querySelector('.content-scroll');
          if (contentScroll && !document.getElementById('noPasswordBanner')) {
            const banner = document.createElement('div');
            banner.id = 'noPasswordBanner';
            banner.style.cssText = 'background:hsl(40,90%,92%);border:1px solid hsl(40,70%,70%);border-radius:10px;padding:12px 18px;margin:0 0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap';
            banner.innerHTML = '<div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">⚠️</span><span style="font-size:13px;color:hsl(40,60%,25%)"><strong>No password set.</strong> Your admin panel is open to anyone with the URL. Set a password to secure it.</span></div><button class="btn btn-primary btn-sm" id="setBannerPw">Set Password Now</button>';
            contentScroll.insertBefore(banner, contentScroll.firstChild);
            document.getElementById('setBannerPw').onclick = showSetPasswordModal;
          }
          if (cpb) { cpb.textContent = '🔒 Set Password'; cpb.onclick = showSetPasswordModal; }
        }
      }).catch(() => {});
      const rb = document.getElementById('refreshBtn');
      if (rb) rb.onclick = loadAll;
      const tt = document.getElementById('themeToggle');
      if (tt) tt.onclick = () => { document.body.classList.toggle('dark'); tt.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙'; };

      const content = $('#tabContent');

      try {
        if (currentTab === 'overview') renderOverview(content);
        else if (currentTab === 'analytics') renderAnalytics(content);
        else if (currentTab === 'users') renderUsers(content);
        else if (currentTab === 'listings') renderListings(content);
        else if (currentTab === 'verifications') renderVerifications(content);
        else if (currentTab === 'reports') renderReports(content);
        else if (currentTab === 'disputes') renderDisputes(content);
        else if (currentTab === 'payouts') renderPayouts(content);
        else if (currentTab === 'feedback') renderFeedback(content);
      } catch (renderErr) {
        console.error('[admin] render error on tab', currentTab, renderErr);
        content.innerHTML = '<div style="color:red;padding:20px">Error rendering ' + currentTab + ': ' + renderErr.message + '</div>';
      }
    }

    function renderOverview(el) {
      if (!stats) { el.innerHTML = '<div class="loading">Loading dashboard...</div>'; return; }
      const sellRate = stats.totalListings > 0 ? Math.round((stats.soldListings / stats.totalListings) * 100) : 0;
      el.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-num">${stats.totalUsers}</div><div class="stat-label">Total Users</div></div>
          <div class="stat-card"><div class="stat-num">${stats.totalListings}</div><div class="stat-label">Total Listings</div></div>
          <div class="stat-card"><div class="stat-num">${stats.activeListings}</div><div class="stat-label">Active</div></div>
          <div class="stat-card"><div class="stat-num" style="color:#666">${stats.soldListings}</div><div class="stat-label">Sold</div></div>
          <div class="stat-card"><div class="stat-num">${sellRate}%</div><div class="stat-label">Sell-Through</div></div>
          <div class="stat-card"><div class="stat-num" style="color:hsl(280,70%,55%)">${stats.shopListings}</div><div class="stat-label">Shops</div></div>
          <div class="stat-card"><div class="stat-num" style="color:#f59e0b">${stats.pendingVerifications}</div><div class="stat-label">Pending IDs</div></div>
          <div class="stat-card"><div class="stat-num" style="color:#ef4444">${stats.pendingReports}</div><div class="stat-label">Open Reports</div></div>
        </div>
        <div class="two-col">
          <div>
            <div class="panel">
              <div class="panel-header">👥 Recent Users</div>
              ${usersList.length === 0 ? '<p style="color:#888;font-size:13px">No users yet</p>' :
                usersList.slice(0,5).map(u => `<a href="/seller/${esc(u.id)}" target="_blank" class="card" style="display:block;text-decoration:none;color:inherit;cursor:pointer;transition:transform .1s,box-shadow .1s;" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 12px rgba(0,0,0,0.08)'" onmouseout="this.style.transform='';this.style.boxShadow=''"><div class="card-body" style="display:flex;align-items:center;gap:10px;"><div style="width:32px;height:32px;border-radius:50%;overflow:hidden;background:#e5e7eb;flex-shrink:0;display:flex;align-items:center;justify-content:center;">${u.profileImageUrl ? `<img src="${esc(u.profileImageUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;">` : `<span style="font-size:14px;color:#9ca3af;">👤</span>`}</div><div style="flex:1;min-width:0;"><div class="label" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(u.displayName || ((u.firstName||'') + ' ' + (u.lastName||'')).trim() || 'Unknown')} <span class="badge ${u.verificationLevel==='id_verified'?'badge-green':u.verificationLevel==='trusted_seller'?'badge-amber':'badge-gray'}" style="font-size:9px;">${esc(u.verificationLevel||'unverified')}</span></div><div class="meta">${esc(u.email||'No email')} · Joined ${fmtDate(u.createdAt)}</div></div></div></a>`).join('')}
            </div>
          </div>
          <div>
            <div class="panel">
              <div class="panel-header">📦 Recent Listings</div>
              ${listingsList.length === 0 ? '<p style="color:#888;font-size:13px">No listings yet</p>' :
                listingsList.slice(0,5).map(l => `<a href="/listing/${l.id}" target="_blank" class="card" style="display:block;text-decoration:none;color:inherit;cursor:pointer;transition:transform .1s,box-shadow .1s;" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 12px rgba(0,0,0,0.08)'" onmouseout="this.style.transform='';this.style.boxShadow=''"><div class="card-body" style="display:flex;align-items:center;gap:10px;">${l.photos && l.photos[0] ? `<div style="width:40px;height:40px;border-radius:8px;overflow:hidden;background:#e5e7eb;flex-shrink:0;"><img src="${esc(l.photos[0])}" alt="" style="width:100%;height:100%;object-fit:cover;"></div>` : `<div style="width:40px;height:40px;border-radius:8px;background:#e5e7eb;flex-shrink:0;display:flex;align-items:center;justify-content:center;"><span style="font-size:16px;">📦</span></div>`}<div style="flex:1;min-width:0;"><div class="label" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"><span>${esc(l.title)}</span> ${l.isShop?'<span class="badge badge-purple">Shop</span>':''} ${l.isSold?'<span class="badge badge-gray">Sold</span>':''}</div><div class="meta">${esc(l.category)} · $${(l.price/100).toFixed(2)} · ${fmtDate(l.createdAt)}</div></div></div></a>`).join('')}
            </div>
          </div>
        </div>`;
    }

    function renderUsers(el) {
      const uf = filters.users;
      let filtered = usersList.filter(u => {
        if (searchUsers) {
          const q = searchUsers.toLowerCase();
          if (!(u.id||'').toLowerCase().includes(q) && !(u.email||'').toLowerCase().includes(q) && !(u.firstName||'').toLowerCase().includes(q) && !(u.lastName||'').toLowerCase().includes(q)) return false;
        }
        if (uf.verification && (u.verificationLevel || 'unverified') !== uf.verification) return false;
        if (!filterByDate(u, 'createdAt', uf.dateFrom, uf.dateTo)) return false;
        return true;
      });
      const sortBy = uf.sort || 'newest';
      if (sortBy === 'newest') filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      else if (sortBy === 'oldest') filtered.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      else if (sortBy === 'name') filtered.sort((a, b) => ((a.firstName||'') + (a.lastName||'')).localeCompare((b.firstName||'') + (b.lastName||'')));
      else if (sortBy === 'lastLogin') filtered.sort((a, b) => new Date(b.lastLoginAt||0) - new Date(a.lastLoginAt||0));

      const filterHtml = renderFilterPanel('users', [
        renderFilterField('Verification', 'f-users-ver', 'select', [
          { value: 'unverified', label: 'Unverified', selected: uf.verification === 'unverified' },
          { value: 'email_verified', label: 'Email Verified', selected: uf.verification === 'email_verified' },
          { value: 'id_verified', label: 'ID Verified', selected: uf.verification === 'id_verified' },
          { value: 'trusted_seller', label: 'Trusted Seller', selected: uf.verification === 'trusted_seller' },
        ]),
        renderFilterField('Sort', 'f-users-sort', 'select', [
          { value: 'newest', label: 'Newest First', selected: uf.sort === 'newest' },
          { value: 'oldest', label: 'Oldest First', selected: uf.sort === 'oldest' },
          { value: 'name', label: 'Name A–Z', selected: uf.sort === 'name' },
          { value: 'lastLogin', label: 'Last Login', selected: uf.sort === 'lastLogin' },
        ]),
        renderFilterField('From', 'f-users-from', 'date', uf.dateFrom),
        renderFilterField('To', 'f-users-to', 'date', uf.dateTo),
      ].join(''));

      el.innerHTML = `
        <div class="search-bar"><input type="search" id="searchUsers" placeholder="Search users by name, email, or ID..." value="${esc(searchUsers)}" /></div>
        ${filterHtml}
        <div class="table-wrap"><table>
          <thead><tr><th>User</th><th>Email</th><th>Verification</th><th>Joined</th><th>Last Login</th><th>Actions</th></tr></thead>
          <tbody>${filtered.map(u => `<tr>
            <td><strong>${esc(u.firstName||'')} ${esc(u.lastName||'')}</strong><br><code style="font-size:10px">${u.id}</code></td>
            <td>${esc(u.email||'—')}</td>
            <td><span class="badge ${u.verificationLevel==='trusted_seller'?'badge-amber':u.verificationLevel==='id_verified'?'badge-green':u.verificationLevel==='email_verified'?'badge-blue':'badge-gray'}">${u.verificationLevel||'unverified'}</span></td>
            <td>${fmtDate(u.createdAt)}</td>
            <td>${u.lastLoginAt ? fmtDate(u.lastLoginAt) : '<span style="color:#aaa">Never</span>'}</td>
            <td style="white-space:nowrap"><button class="btn btn-outline btn-xs" data-action="edit-user" data-id="${u.id}">Edit</button> <button class="btn btn-red btn-xs" data-action="delete-user" data-id="${u.id}">Delete</button></td>
          </tr>`).join('')}</tbody>
        </table></div>
        <div style="margin-top:10px;font-size:12px;color:#888">${filtered.length} user${filtered.length!==1?'s':''}</div>`;
      const si = $('#searchUsers');
      si.oninput = () => { searchUsers = si.value; renderUsers(el); };
      si.focus();
      si.selectionStart = si.selectionEnd = si.value.length;
      bindFilterToggle('users', renderUsers, el);
      ['f-users-ver', 'f-users-sort'].forEach(id => { const e = document.getElementById(id); if (e) e.onchange = () => { uf[id === 'f-users-ver' ? 'verification' : 'sort'] = e.value; renderUsers(el); }; });
      ['f-users-from', 'f-users-to'].forEach(id => { const e = document.getElementById(id); if (e) e.onchange = () => { uf[id === 'f-users-from' ? 'dateFrom' : 'dateTo'] = e.value; renderUsers(el); }; });
    }

    function renderListings(el) {
      const lf = filters.listings;
      const allCategories = [...new Set(listingsList.map(l => l.category).filter(Boolean))].sort();
      const allCountries = [...new Set(listingsList.map(l => l.country).filter(Boolean))].sort();
      const allCities = [...new Set(listingsList.map(l => l.city).filter(Boolean))].sort();

      const filtered = listingsList.filter(l => {
        if (searchListings) {
          const q = searchListings.toLowerCase();
          const status = l.isSold ? 'sold' : l.isBoosted ? 'boosted active' : 'active';
          const type = l.isShop ? 'shop' : l.listingType === 'yard_sale' ? 'yard sale yard_sale' : 'individual item';
          const searchable = [l.title, l.category, l.city, l.country, l.userId, l.description, status, type, l.condition].filter(Boolean).join(' ').toLowerCase();
          if (!searchable.includes(q)) return false;
        }
        if (lf.category && l.category !== lf.category) return false;
        if (lf.status === 'active' && l.isSold) return false;
        if (lf.status === 'sold' && !l.isSold) return false;
        if (lf.status === 'boosted' && !l.isBoosted) return false;
        if (lf.country && l.country !== lf.country) return false;
        if (lf.city && l.city !== lf.city) return false;
        if (lf.type === 'shop' && !l.isShop) return false;
        if (lf.type === 'yard_sale' && l.listingType !== 'yard_sale') return false;
        if (lf.type === 'individual' && (l.listingType !== 'individual' || l.isShop)) return false;
        if (lf.priceMin && l.price < Number(lf.priceMin) * 100) return false;
        if (lf.priceMax && l.price > Number(lf.priceMax) * 100) return false;
        if (!filterByDate(l, 'createdAt', lf.dateFrom, lf.dateTo)) return false;
        return true;
      });

      const filterHtml = renderFilterPanel('listings', [
        renderFilterField('Category', 'f-lst-cat', 'select', allCategories.map(c => ({ value: c, label: c, selected: lf.category === c }))),
        renderFilterField('Status', 'f-lst-status', 'select', [
          { value: 'active', label: 'Active', selected: lf.status === 'active' },
          { value: 'sold', label: 'Sold', selected: lf.status === 'sold' },
          { value: 'boosted', label: 'Boosted', selected: lf.status === 'boosted' },
        ]),
        renderFilterField('Type', 'f-lst-type', 'select', [
          { value: 'individual', label: 'Individual', selected: lf.type === 'individual' },
          { value: 'yard_sale', label: 'Yard Sale', selected: lf.type === 'yard_sale' },
          { value: 'shop', label: 'Shop', selected: lf.type === 'shop' },
        ]),
        renderFilterField('Country', 'f-lst-country', 'select', allCountries.map(c => ({ value: c, label: c, selected: lf.country === c }))),
        renderFilterField('City', 'f-lst-city', 'select', allCities.map(c => ({ value: c, label: c, selected: lf.city === c }))),
        renderFilterField('Min $', 'f-lst-pmin', 'number', lf.priceMin),
        renderFilterField('Max $', 'f-lst-pmax', 'number', lf.priceMax),
        renderFilterField('From', 'f-lst-from', 'date', lf.dateFrom),
        renderFilterField('To', 'f-lst-to', 'date', lf.dateTo),
      ].join(''));

      el.innerHTML = `
        <div class="search-bar"><input type="search" id="searchListings" placeholder="Search by title, category, city, status (active, sold, boosted), type (shop, yard sale)..." value="${esc(searchListings)}" /></div>
        ${filterHtml}
        <div class="table-wrap"><table>
          <thead><tr><th>Listing</th><th>Type</th><th>Price</th><th>Status</th><th>Views</th><th>Created</th><th>Actions</th></tr></thead>
          <tbody>${filtered.map(l => `<tr>
            <td><a href="/listing/${l.id}" target="_blank" class="truncate" style="max-width:200px;display:inline-block">${esc(l.title)}</a><br><span style="font-size:10px;color:#888">${esc(l.category)} · ${esc(l.city||'')} ${esc(l.country||'')}</span></td>
            <td>${l.isShop?'<span class="badge badge-purple">Shop</span>':l.listingType==='yard_sale'?'<span class="badge badge-amber">Yard Sale</span>':'<span class="badge badge-blue">Item</span>'}</td>
            <td>$${(l.price/100).toFixed(2)}</td>
            <td>${l.isSold?'<span class="badge badge-gray">Sold</span>':l.isBoosted?'<span class="badge badge-green">Boosted</span>':'<span class="badge badge-blue">Active</span>'}</td>
            <td>${l.viewCount||0}</td>
            <td>${fmtDate(l.createdAt)}</td>
            <td><button class="btn btn-red btn-xs" data-action="delete-listing" data-id="${l.id}">Delete</button></td>
          </tr>`).join('')}</tbody>
        </table></div>
        <div style="margin-top:10px;font-size:12px;color:#888">${filtered.length} listing${filtered.length!==1?'s':''}</div>`;
      const si = $('#searchListings');
      si.oninput = () => { searchListings = si.value; renderListings(el); };
      si.focus();
      si.selectionStart = si.selectionEnd = si.value.length;
      bindFilterToggle('listings', renderListings, el);
      const fMap = { 'f-lst-cat': 'category', 'f-lst-status': 'status', 'f-lst-type': 'type', 'f-lst-country': 'country', 'f-lst-city': 'city' };
      Object.entries(fMap).forEach(([id, key]) => { const e = document.getElementById(id); if (e) e.onchange = () => { lf[key] = e.value; renderListings(el); }; });
      ['f-lst-pmin', 'f-lst-pmax'].forEach(id => { const e = document.getElementById(id); if (e) e.oninput = () => { lf[id === 'f-lst-pmin' ? 'priceMin' : 'priceMax'] = e.value; renderListings(el); }; });
      ['f-lst-from', 'f-lst-to'].forEach(id => { const e = document.getElementById(id); if (e) e.onchange = () => { lf[id === 'f-lst-from' ? 'dateFrom' : 'dateTo'] = e.value; renderListings(el); }; });
    }

    function renderVerifications(el) {
      const vf = filters.verifications;
      const filtered = verifications.filter(v => {
        if (vf.status && v.status !== vf.status) return false;
        return true;
      });
      const filterHtml = renderFilterPanel('verifications', [
        renderFilterField('Status', 'f-ver-status', 'select', [
          { value: 'pending', label: 'Pending', selected: vf.status === 'pending' },
          { value: 'approved', label: 'Approved', selected: vf.status === 'approved' },
          { value: 'rejected', label: 'Rejected', selected: vf.status === 'rejected' },
          { value: 'expired', label: 'Expired', selected: vf.status === 'expired' },
        ]),
      ].join(''));
      if (!filtered.length) { el.innerHTML = filterHtml + '<div class="empty"><div class="empty-icon">🛡️</div><p>No verification requests</p></div>'; bindFilterToggle('verifications', renderVerifications, el); const e = document.getElementById('f-ver-status'); if (e) e.onchange = () => { vf.status = e.value; renderVerifications(el); }; return; }
      el.innerHTML = filterHtml + filtered.map(v => {
        const safeUsername = esc(v.username || 'Unknown');
        const safeEmail = esc(v.email || '');
        const safeUserId = esc(v.userId || '');
        const safeProfileImg = v.profileImageUrl && v.profileImageUrl.startsWith('/') ? esc(v.profileImageUrl) : '';
        const safeDocUrl = v.documentUrl && (v.documentUrl.startsWith('/') || v.documentUrl.startsWith('http')) ? esc(v.documentUrl) : '';
        const safeStatus = esc(v.status);
        const vLevel = v.verificationLevel || 'unverified';
        const levelBadge = vLevel === 'trusted_seller' ? '<span class="badge badge-green" style="font-size:10px;">🌟 Trusted Seller</span>'
          : vLevel === 'id_verified' ? '<span class="badge badge-green" style="font-size:10px;">✓ ID Verified</span>'
          : '<span class="badge badge-gray" style="font-size:10px;">Unverified</span>';
        const expiryInfo = v.expiryDate ? `<div class="meta" style="margin-top:2px;">📅 Expires ${fmtDate(v.expiryDate)}${new Date(v.expiryDate) <= new Date() ? ' <span class="badge badge-red" style="font-size:10px;">EXPIRED</span>' : ''}</div>` : '';
        const adminNoteInfo = v.adminNote ? `<div class="meta" style="margin-top:2px;">📝 ${esc(v.adminNote)}</div>` : '';
        const defaultExpiry = new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
        const pendingFields = v.status === 'pending' ? `
          <div style="margin-top:10px;padding:14px 16px;background:hsl(var(--surface));border-radius:10px;border:1px solid hsl(var(--border));">
            <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:end;">
              <div style="flex:1;min-width:180px;">
                <label style="display:block;font-size:11px;font-weight:600;color:hsl(var(--muted));margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">ID Expiry Date</label>
                <input type="date" id="ver-expiry-${v.id}" value="${defaultExpiry}" min="${new Date().toISOString().split('T')[0]}" style="width:100%;padding:8px 12px;border:1px solid hsl(var(--border));border-radius:8px;font-size:13px;background:hsl(var(--bg));color:hsl(var(--fg));cursor:pointer;" />
              </div>
              <div style="flex:2;min-width:200px;">
                <label style="display:block;font-size:11px;font-weight:600;color:hsl(var(--muted));margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Admin Notes (optional)</label>
                <input type="text" id="ver-note-${v.id}" placeholder="e.g. Passport verified, expires 2027" style="width:100%;padding:8px 12px;border:1px solid hsl(var(--border));border-radius:8px;font-size:13px;background:hsl(var(--bg));color:hsl(var(--fg));" />
              </div>
            </div>
          </div>` : '';
        return `<div class="card">
        <div class="card-body" style="display:flex;align-items:center;gap:14px;">
          <div style="width:44px;height:44px;border-radius:50%;overflow:hidden;background:#e5e7eb;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
            ${safeProfileImg
              ? `<img src="${safeProfileImg}" alt="" style="width:100%;height:100%;object-fit:cover;" />`
              : `<span style="font-size:18px;color:#9ca3af;">👤</span>`}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <a href="/seller/${safeUserId}" target="_blank" style="font-weight:700;font-size:15px;color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${safeUsername}</a>
              <span class="badge ${v.status==='approved'?'badge-green':v.status==='rejected'?'badge-red':v.status==='expired'?'badge-red':'badge-gray'}">${v.status === 'expired' ? '⏰ Expired' : safeStatus}</span>
              ${levelBadge}
            </div>
            <div class="meta" style="margin-top:2px;">${safeEmail} · <code style="font-size:11px;opacity:0.6;">${safeUserId.substring(0,12)}…</code></div>
            <div class="meta" style="margin-top:2px;">Submitted ${fmtDate(v.createdAt)}</div>
            ${expiryInfo}
            ${adminNoteInfo}
          </div>
        </div>
        ${pendingFields}
        <div class="card-actions">
          <a href="/seller/${safeUserId}" target="_blank" class="btn btn-outline btn-sm">View Profile</a>

    function getChartColors() {
      const isDark = document.body.classList.contains('dark');
      return {
        primary: 'hsl(128, 85%, 45%)',
        primaryBg: isDark ? 'hsla(128, 85%, 45%, 0.15)' : 'hsla(128, 85%, 45%, 0.08)',
        secondary: 'hsl(210, 80%, 55%)',
        secondaryBg: isDark ? 'hsla(210, 80%, 55%, 0.15)' : 'hsla(210, 80%, 55%, 0.08)',
        text: isDark ? '#ccc' : '#555',
        grid: isDark ? '#1c201c' : '#e8ece8',
        palette: ['hsl(128,85%,45%)','hsl(210,80%,55%)','hsl(45,90%,50%)','hsl(0,75%,55%)','hsl(280,70%,55%)','hsl(180,60%,45%)','hsl(30,85%,55%)','hsl(330,70%,55%)','hsl(160,60%,40%)','hsl(60,70%,45%)'],
      };
    }

    function fillDateGaps(data, days) {
      const map = new Map();
      data.forEach(d => { const key = new Date(d.date).toISOString().split('T')[0]; map.set(key, d.count); });
      const result = [];
      for (let i = days - 1; i >= 0; i--) {
        const dt = new Date(); dt.setDate(dt.getDate() - i);
        const key = dt.toISOString().split('T')[0];
        result.push({ date: key, count: map.get(key) || 0 });
      }
      return result;
    }

    function fillGrowthGaps(data, days, baseline) {
      const map = new Map();
      data.forEach(d => { const key = new Date(d.date).toISOString().split('T')[0]; map.set(key, { count: d.count, cumulative: Number(d.cumulative) || 0 }); });
      const result = [];
      let lastCum = baseline || 0;
      for (let i = days - 1; i >= 0; i--) {
        const dt = new Date(); dt.setDate(dt.getDate() - i);
        const key = dt.toISOString().split('T')[0];
        const entry = map.get(key);
        if (entry) { lastCum = entry.cumulative; result.push({ date: key, count: entry.count, cumulative: lastCum }); }
        else { result.push({ date: key, count: 0, cumulative: lastCum }); }
      }
      return result;
    }

      const messagesEl = document.getElementById('dispute-chat-messages-' + orderId);

        if (!msgs || msgs.length === 0) {
          messagesEl.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">No messages yet. Start the conversation to help resolve this dispute.</div>';
          return;

        const roleColors = { buyer: '#3b82f6', seller: '#16a34a', admin: '#f97316' };
        const roleLabels = { buyer: 'Buyer', seller: 'Seller', admin: 'Support' };
        messagesEl.innerHTML = msgs.map(m => `
          <div style="display:flex;gap:8px;margin-bottom:10px;${m.senderRole === 'admin' ? 'flex-direction:row-reverse' : ''}">

                <span style="color:${roleColors[m.senderRole] || '#888'}">●</span>
                ${esc(m.senderName)} <span style="font-weight:400;color:var(--muted)">(${roleLabels[m.senderRole] || m.senderRole})</span>

      if (disputeChatSending[orderId]) return;
      const inputEl = document.getElementById('dispute-chat-input-' + orderId);
      if (!inputEl || !inputEl.value.trim()) return;
      const content = inputEl.value.trim();
      inputEl.value = '';
      disputeChatSending[orderId] = true;
      try {
        await api('/api/orders/' + orderId + '/dispute-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        });
        loadDisputeChat(orderId);
      } catch (e) {
        showToast('Failed to send message: ' + (e.message || 'Unknown error'));
        inputEl.value = content;
      } finally {
        disputeChatSending[orderId] = false;
      }
    }

      showConfirm('Resolve Dispute', `Are you sure you want to ${label} for Order #${orderId}?`, async () => {
        try {
          await api(`/api/admin/disputes/${orderId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, adminNote }),
          });
          showToast(`Dispute resolved — ${action === 'release' ? 'funds released' : 'refund issued'}`);
          loadAll();
        } catch (e) {
          showToast('Failed to resolve dispute: ' + (e.message || 'Unknown error'));
        }
      });

      const labels = { processing: 'mark as processing', completed: 'mark as completed (funds sent)', rejected: 'reject' };
      const adminNote = status === 'rejected' ? prompt('Reason for rejection (optional):') || '' : (status === 'completed' ? prompt('Add a note (optional, e.g. transaction ID):') || '' : '');
      showConfirm('Update Payout', `Are you sure you want to ${labels[status] || status} payout #${payoutId}?`, async () => {
        try {
          await api(`/api/admin/payouts/${payoutId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status, adminNote }),
          });
          showToast(`Payout #${payoutId} ${status === 'completed' ? 'completed' : status === 'rejected' ? 'rejected' : 'updated'} successfully`);
          render();
        } catch (e) {
          showToast('Failed to update payout: ' + (e.message || 'Unknown error'));
        }
      });

    function renderFeedback(el) {
      const ff = filters.feedback;
      const filtered = feedbackList.filter(f => {
        if (ff.status && f.status !== ff.status) return false;
        if (ff.type && f.type !== ff.type) return false;
        if (!filterByDate(f, 'createdAt', ff.dateFrom, ff.dateTo)) return false;
        return true;
      });
      const filterHtml = renderFilterPanel('feedback', [
        renderFilterField('Status', 'f-fb-status', 'select', [
          { value: 'new', label: 'New', selected: ff.status === 'new' },
          { value: 'reviewed', label: 'Reviewed', selected: ff.status === 'reviewed' },
          { value: 'resolved', label: 'Resolved', selected: ff.status === 'resolved' },
        ]),
        renderFilterField('Type', 'f-fb-type', 'select', [
          { value: 'bug', label: 'Bug', selected: ff.type === 'bug' },
          { value: 'feature', label: 'Feature', selected: ff.type === 'feature' },
          { value: 'feedback', label: 'Feedback', selected: ff.type === 'feedback' },
        ]),
        renderFilterField('From', 'f-fb-from', 'date', ff.dateFrom),
        renderFilterField('To', 'f-fb-to', 'date', ff.dateTo),
      ].join(''));

      const typeIcons = { bug: '🐛', feature: '💡', feedback: '💬' };
      const statusBadge = s => s === 'new' ? 'badge-amber' : s === 'reviewed' ? 'badge-blue' : 'badge-green';

      if (!filtered.length) {
        el.innerHTML = filterHtml + '<div class="empty"><div class="empty-icon">💬</div><p>No feedback submissions</p></div>';
        bindFilterToggle('feedback', renderFeedback, el);
        const fSt = document.getElementById('f-fb-status'); if (fSt) fSt.onchange = () => { ff.status = fSt.value; renderFeedback(el); };
        const fTy = document.getElementById('f-fb-type'); if (fTy) fTy.onchange = () => { ff.type = fTy.value; renderFeedback(el); };
        ['f-fb-from', 'f-fb-to'].forEach(id => { const e = document.getElementById(id); if (e) e.onchange = () => { ff[id === 'f-fb-from' ? 'dateFrom' : 'dateTo'] = e.value; renderFeedback(el); }; });
        return;
      }

      el.innerHTML = filterHtml + `<div style="margin-bottom:8px;font-size:12px;color:#888">${filtered.length} item${filtered.length!==1?'s':''}</div>` + filtered.map(f => `<div class="card" style="flex-direction:column;align-items:stretch">
        <div class="card-body">
          <div class="label">${typeIcons[f.type]||'💬'} <span class="badge badge-gray">${f.type}</span> <span class="badge ${statusBadge(f.status)}">${f.status}</span></div>
          <div class="detail" style="margin:6px 0;white-space:pre-wrap">${esc(f.message)}</div>
          ${f.email ? `<div class="meta">📧 ${esc(f.email)}</div>` : ''}
          ${f.adminNote ? `<div class="detail" style="margin-top:4px"><strong>Admin note:</strong> ${esc(f.adminNote)}</div>` : ''}
          <div class="meta">Submitted ${fmtDate(f.createdAt)}</div>
        </div>
        ${f.status !== 'resolved' ? `<div style="margin-top:8px">
          <textarea id="fbnote-${f.id}" placeholder="Admin note (optional)..." style="width:100%;padding:10px 14px;border:2px solid #e5e8e5;border-radius:10px;font-size:13px;background:#f8faf8;resize:vertical;min-height:50px;outline:none;font-family:inherit">${esc(f.adminNote||'')}</textarea>
          <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">
            ${f.status === 'new' ? `<button class="btn btn-outline btn-sm" data-action="review-feedback" data-id="${f.id}">Mark Reviewed</button>` : ''}
            <button class="btn btn-green btn-sm" data-action="resolve-feedback" data-id="${f.id}">Resolve</button>
          </div>
        </div>` : ''}
      </div>`).join('');

      bindFilterToggle('feedback', renderFeedback, el);
      const fSt = document.getElementById('f-fb-status'); if (fSt) fSt.onchange = () => { ff.status = fSt.value; renderFeedback(el); };
      const fTy = document.getElementById('f-fb-type'); if (fTy) fTy.onchange = () => { ff.type = fTy.value; renderFeedback(el); };
      ['f-fb-from', 'f-fb-to'].forEach(id => { const e = document.getElementById(id); if (e) e.onchange = () => { ff[id === 'f-fb-from' ? 'dateFrom' : 'dateTo'] = e.value; renderFeedback(el); }; });

    window.updateVerification = updateVerification;
    window.updateReport = updateReport;
    window.updateFeedback = updateFeedback;
    window.deleteUser = deleteUser;
    window.deleteListing = deleteListing;
    window.showEditUserModal = showEditUserModal;

    document.addEventListener('click', function(e) {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      console.log('[admin] action:', action, 'id:', id);
      if (action === 'approve-verification') updateVerification(Number(id), 'approved');
      else if (action === 'reject-verification') updateVerification(Number(id), 'rejected');
      else if (action === 'view-user-history') showUserVerificationHistory(btn.dataset.userid, btn.dataset.username);
      else if (action === 'delete-listing') deleteListing(Number(id));
      else if (action === 'delete-user') deleteUser(id);
      else if (action === 'edit-user') showEditUserModal(id);
      else if (action === 'dismiss-report') updateReport(Number(id), 'dismissed');
      else if (action === 'remove-report') updateReport(Number(id), 'removed');
      else if (action === 'review-feedback') { const note = document.getElementById('fbnote-' + id); updateFeedback(Number(id), 'reviewed', note ? note.value : ''); }
      else if (action === 'resolve-feedback') { const note = document.getElementById('fbnote-' + id); updateFeedback(Number(id), 'resolved', note ? note.value : ''); }
      else if (action === 'refresh') loadAll();
      else if (action === 'release-dispute') resolveDispute(Number(id), 'release');
      else if (action === 'refund-dispute') resolveDispute(Number(id), 'refund');
      else if (action === 'payout-process') updatePayout(Number(id), 'processing');
      else if (action === 'payout-complete') updatePayout(Number(id), 'completed');
      else if (action === 'payout-reject') updatePayout(Number(id), 'rejected');
      else if (action === 'copy-field') {
        const val = btn.dataset.value || '';
        navigator.clipboard.writeText(val).then(() => {
          btn.textContent = 'Copied!';
          setTimeout(() => btn.textContent = 'Copy', 1500);
        });
      }
      else if (action === 'copy-all-payout') {
        const container = document.getElementById('payout-details-' + id);
        if (container) {
          const inputs = container.querySelectorAll('input[readonly]');
          const labels = container.querySelectorAll('td:first-child');
          const lines = [];
          labels.forEach((td, i) => {
            const label = td.textContent.trim();
            const val = inputs[i] ? inputs[i].value : '';
            if (val && val !== 'N/A') lines.push(label + ': ' + val);
          });
          navigator.clipboard.writeText(lines.join('\n')).then(() => {
            btn.textContent = 'All Copied!';
            setTimeout(() => btn.textContent = 'Copy All Details', 1500);
          });
        }
      }
    });

    if (localStorage.getItem('admin-dark') === 'true' || (!localStorage.getItem('admin-dark') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark');
    }
    checkAdmin();
  </script>
</body>
</html>
